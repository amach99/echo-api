name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test, Lint & Type-check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: echo
          POSTGRES_DB: echo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://echo:echo@localhost:5432/echo_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET_KEY: ci-test-secret-key-not-for-production
      JWT_REFRESH_SECRET_KEY: ci-test-refresh-secret-key-not-for-production
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET: test-bucket
      AWS_REGION: us-east-1
      RESEND_API_KEY: re_test_placeholder
      ID_VERIFICATION_PROVIDER: mock

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run pytest
        run: pytest tests/ --tb=short -q --no-cov

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # mypy warnings don't block merge; errors do
